services:
  - type: web
    name: siteforge-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: none
